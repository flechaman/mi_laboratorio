name: mi-laboratorio

services:
  postgres:
    image: postgres:16-alpine
    container_name: mi-lab-postgres
    profiles:
      - data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab_password}
      POSTGRES_DB: ${POSTGRES_DB:-lab}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  grafana:
    image: grafana/grafana-oss:latest
    container_name: mi-lab-grafana
    profiles:
      - observability
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning

  prometheus:
    image: prom/prometheus:latest
    container_name: mi-lab-prometheus
    profiles:
      - observability
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/grafana/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mi-lab-qdrant
    profiles:
      - rag
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  postgres-data:
  grafana-data:
  qdrant-data:
